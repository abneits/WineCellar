version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - N8N_PAIRING_WEBHOOK_URL=${N8N_PAIRING_WEBHOOK_URL:-}
      - SERVER_PORT=8080
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - MAX_IMAGE_SIZE_MB=${MAX_IMAGE_SIZE_MB:-10}
    restart: unless-stopped
